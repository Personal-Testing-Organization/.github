name: Create Jira issue from labeled PR

on:
  workflow_call:
    inputs:
      pr_title:
        required: true
        type: string
      pr_url:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      repository:
        required: true
        type: string
      branch_name:
        required: true
        type: string
    secrets:
      JIRA_API_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Create Jira issue
        env:
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ vars.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
          JIRA_CF_GITHUB_REPOSITORY: ${{ vars.JIRA_CF_GITHUB_REPOSITORY }}
          JIRA_CF_GITHUB_PR_NUMBER: ${{ vars.JIRA_CF_GITHUB_PR_NUMBER }}
          JIRA_CF_GITHUB_PR_URL: ${{ vars.JIRA_CF_GITHUB_PR_URL }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_URL: ${{ inputs.pr_url }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          echo "Processing PR #$PR_NUMBER"
          echo "Repository: $REPOSITORY"
          echo "Branch: $BRANCH_NAME"

          update_pr_with_jira_key() {
            local jira_key="$1"

            echo "Updating PR with Jira key: $jira_key"

            CURRENT_TITLE=$(gh pr view "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --json title \
              --jq '.title')

            if [[ "$CURRENT_TITLE" != *"$jira_key"* ]]; then
              NEW_TITLE="[$jira_key] $CURRENT_TITLE"

              echo "Updating PR title to: $NEW_TITLE"

              gh pr edit "$PR_NUMBER" \
                --repo "$REPOSITORY" \
                --title "$NEW_TITLE"
            else
              echo "PR title already contains Jira issue key"
            fi

            CURRENT_BODY=$(gh pr view "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --json body \
              --jq '.body // ""')

            if [[ "$CURRENT_BODY" != *"$jira_key"* ]]; then
              UPDATED_BODY="$CURRENT_BODY

          Jira issue: $jira_key"

              echo "Updating PR body with Jira issue key"

              gh pr edit "$PR_NUMBER" \
                --repo "$REPOSITORY" \
                --body "$UPDATED_BODY"
            else
              echo "PR body already contains Jira issue key"
            fi
          }

          extract_jira_key_from_text() {
            local text="$1"

            echo "$text" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -n 1 || true
          }

          JIRA_KEY_FROM_TITLE=$(extract_jira_key_from_text "$PR_TITLE")

          if [ -n "$JIRA_KEY_FROM_TITLE" ]; then
            echo "Jira issue key found in PR title: $JIRA_KEY_FROM_TITLE"

            update_pr_with_jira_key "$JIRA_KEY_FROM_TITLE"

            gh pr comment "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --body "Pull Request already references Jira issue: $JIRA_KEY_FROM_TITLE"

            exit 0
          fi

          JIRA_KEY_FROM_BRANCH=$(extract_jira_key_from_text "$BRANCH_NAME")

          if [ -n "$JIRA_KEY_FROM_BRANCH" ]; then
            echo "Jira issue key found in branch name: $JIRA_KEY_FROM_BRANCH"

            update_pr_with_jira_key "$JIRA_KEY_FROM_BRANCH"

            gh pr comment "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --body "Branch already references Jira issue: $JIRA_KEY_FROM_BRANCH"

            exit 0
          fi

          REPO_CF_NUM="${JIRA_CF_GITHUB_REPOSITORY#customfield_}"
          PR_NUMBER_CF_NUM="${JIRA_CF_GITHUB_PR_NUMBER#customfield_}"

          JQL="project = $JIRA_PROJECT_KEY AND cf[$REPO_CF_NUM] ~ \"$REPOSITORY\" AND cf[$PR_NUMBER_CF_NUM] = $PR_NUMBER"

          echo "Searching existing Jira issue with JQL:"
          echo "$JQL"

          SEARCH_PAYLOAD=$(jq -n \
            --arg jql "$JQL" \
            '{
              jql: $jql,
              maxResults: 1,
              fields: ["key"]
            }')

          SEARCH_RESPONSE=$(curl -s -X POST "$JIRA_BASE_URL/rest/api/3/search/jql" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --data "$SEARCH_PAYLOAD")

          echo "$SEARCH_RESPONSE"

          TOTAL=$(echo "$SEARCH_RESPONSE" | jq -r '.issues | length')

          if [ "$TOTAL" != "0" ]; then
            EXISTING_ISSUE_KEY=$(echo "$SEARCH_RESPONSE" | jq -r '.issues[0].key')
            echo "Existing Jira issue found: $EXISTING_ISSUE_KEY"

            update_pr_with_jira_key "$EXISTING_ISSUE_KEY"

            gh pr comment "$PR_NUMBER" \
              --repo "$REPOSITORY" \
              --body "Jira issue already exists: $EXISTING_ISSUE_KEY"

            exit 0
          fi

          echo "No existing Jira issue found. Creating new Jira issue..."

          CREATE_PAYLOAD=$(jq -n \
            --arg projectKey "$JIRA_PROJECT_KEY" \
            --arg issueType "$JIRA_ISSUE_TYPE" \
            --arg prTitle "$PR_TITLE" \
            --arg repository "$REPOSITORY" \
            --arg prUrl "$PR_URL" \
            --arg prNumber "$PR_NUMBER" \
            --arg repoField "$JIRA_CF_GITHUB_REPOSITORY" \
            --arg prNumberField "$JIRA_CF_GITHUB_PR_NUMBER" \
            --arg prUrlField "$JIRA_CF_GITHUB_PR_URL" \
            '{
              fields: {
                project: {
                  key: $projectKey
                },
                summary: ("GitHub PR: " + $prTitle),
                description: {
                  type: "doc",
                  version: 1,
                  content: [
                    {
                      type: "paragraph",
                      content: [
                        {
                          type: "text",
                          text: ("GitHub-driven issue created from Pull Request.\n\nRepository: " + $repository + "\nPR number: " + $prNumber + "\nPR URL: " + $prUrl)
                        }
                      ]
                    }
                  ]
                },
                labels: ["github-driven"],
                issuetype: {
                  name: $issueType
                },
                ($repoField): $repository,
                ($prNumberField): ($prNumber | tonumber),
                ($prUrlField): $prUrl
              }
            }')

          echo "Create payload:"
          echo "$CREATE_PAYLOAD" | jq .

          RESPONSE=$(curl -s -X POST "$JIRA_BASE_URL/rest/api/3/issue" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --data "$CREATE_PAYLOAD")

          echo "Jira response:"
          echo "$RESPONSE" | jq .

          ISSUE_KEY=$(echo "$RESPONSE" | jq -r '.key')

          if [ "$ISSUE_KEY" = "null" ] || [ -z "$ISSUE_KEY" ]; then
            echo "Jira issue creation failed"
            exit 1
          fi

          echo "Created Jira issue: $ISSUE_KEY"

          update_pr_with_jira_key "$ISSUE_KEY"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body "Created Jira issue: $ISSUE_KEY"
